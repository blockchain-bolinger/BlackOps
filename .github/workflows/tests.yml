name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage gate
        run: |
          pytest -q --cov=core.config_manager --cov=core.plugin_manager --cov=core.execution_service --cov=core.process_runner --cov=core.tool_contract --cov=core.blackops_logger --cov=core.redaction_utils --cov=core.metrics --cov=core.policy_engine --cov=core.telemetry --cov=web.app --cov-report=term-missing --cov-fail-under=75

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
